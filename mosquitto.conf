# Prototype Mosquitto configuration.
# Local development permits anonymous clients.
# For deployment, enable password_file, ACLs, and TLS.

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

listener 1883 0.0.0.0
allow_anonymous true

listener 9001 0.0.0.0
protocol websockets
allow_anonymous true
